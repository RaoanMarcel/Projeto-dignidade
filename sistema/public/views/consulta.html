<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto Dignidade - Consulta</title>
    
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        /* Estilo para o indicador de carregamento do HTMX */
        .htmx-indicator {
            display: none;
        }
        .htmx-request .htmx-indicator {
            display: inline-flex;
        }
        .htmx-request.htmx-indicator {
            display: inline-flex;
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen p-8 font-sans text-slate-800 flex justify-center">

    <div class="w-full max-w-5xl flex flex-col gap-6">
        
        <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6 lg:p-8">
            <header class="flex items-center gap-3 mb-6">
                <div class="bg-indigo-600 p-2.5 rounded-xl text-white shadow-md">
                    <i class="ph ph-magnifying-glass text-2xl"></i>
                </div>
                <div>
                    <h2 class="text-2xl font-black text-slate-900 leading-tight">Consulta de Acolhidos</h2>
                    <p class="text-sm font-medium text-slate-500">Busque por nome, apelido, documento ou aptidão</p>
                </div>
            </header>

            <div class="relative">
                <input type="text" 
                       name="termo_busca" 
                       placeholder="Digite aqui para buscar..." 
                       class="w-full rounded-xl border-2 border-slate-200 bg-slate-50 py-4 pl-14 pr-4 text-lg text-slate-900 font-medium transition-all hover:border-indigo-300 focus:bg-white focus:border-indigo-600 focus:outline-none focus:ring-4 focus:ring-indigo-600/10 shadow-sm"
                       autocomplete="off"
                       autofocus
                       hx-post="/buscar"
                       hx-trigger="keyup changed delay:500ms, search"
                       hx-target="#resultado-busca"
                       hx-indicator="#loading-spinner">
                
                <i class="ph ph-magnifying-glass absolute left-5 top-1/2 -translate-y-1/2 text-2xl text-slate-400"></i>
                
                <div id="loading-spinner" class="htmx-indicator absolute right-5 top-1/2 -translate-y-1/2 text-indigo-600">
                    <i class="ph ph-spinner-gap animate-spin text-2xl"></i>
                </div>
            </div>
        </div>

        <div id="resultado-busca" class="w-full flex flex-col gap-4">
            
            <div class="bg-slate-200/50 rounded-2xl border border-slate-200 border-dashed p-12 flex flex-col items-center justify-center text-center text-slate-500">
                <i class="ph ph-address-book text-6xl mb-3 text-slate-400"></i>
                <h3 class="text-lg font-bold text-slate-700">Pronto para buscar</h3>
                <p class="text-sm max-w-sm mt-1">Digite os dados na barra acima para encontrar o cadastro completo de um acolhido.</p>
            </div>

        </div>

    </div>

    <div id="modal-container"></div>

</body>
</html>

<form id="formCadastro" hx-post="/cadastrar" hx-target="#mensagem-retorno" hx-swap="innerHTML" class="w-full max-w-[1500px] h-full flex flex-col gap-4">
    
    <div class="flex-1 flex gap-4 min-h-0">
        
        <div class="w-1/3 flex flex-col gap-4">
            
            <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-5 flex flex-col shrink-0">
                <header class="flex items-center gap-3 mb-4">
                    <div class="bg-indigo-600 p-2 rounded-xl text-white shadow-md">
                        <i class="ph ph-user-focus text-2xl"></i>
                    </div>
                    <div>
                        <h2 class="text-xl font-black text-slate-900 leading-tight">Novo Acolhido</h2>
                        <p class="text-xs font-semibold text-indigo-600 uppercase tracking-wide">Registro de Entrada</p>
                    </div>
                </header>
                
                <div class="w-full relative bg-slate-200 rounded-xl overflow-hidden flex items-center justify-center h-48 border border-slate-300 shadow-inner mb-4">
                    <i class="ph ph-camera-slash text-4xl text-slate-400 absolute"></i>
                    <video id="webcam" class="w-full h-full object-cover hidden relative z-10" autoplay playsinline></video>
                    <img id="fotoCapturada" class="w-full h-full object-cover hidden relative z-20" />
                    <canvas id="canvasFoto" class="hidden"></canvas>
                </div>
                <input type="hidden" name="foto" id="inputFotoBase64">
                
                <div class="flex gap-3 w-full">
                    <button type="button" onclick="iniciarCamera()" class="flex-1 flex items-center justify-center gap-2 bg-white border border-slate-300 hover:bg-slate-50 hover:border-slate-400 text-slate-700 py-2.5 rounded-xl text-sm font-bold transition-all shadow-sm">
                        <i class="ph ph-video-camera text-lg"></i> Ligar Câmera
                    </button>
                    <button type="button" onclick="capturarFoto()" class="flex-1 flex items-center justify-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white py-2.5 rounded-xl text-sm font-bold transition-all shadow-md active:scale-95">
                        <i class="ph ph-aperture text-lg"></i> Capturar
                    </button>
                </div>
            </div>

            <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-5 flex flex-col flex-1 justify-center gap-4">
                <div>
                    <label class="block text-xs font-bold text-slate-600 mb-1.5">Nome de Registro</label>
                    <input type="text" name="nome" placeholder="Nome completo" class="w-full rounded-xl border border-slate-200 bg-slate-50/50 px-3 py-2 text-sm text-slate-900 font-medium transition-all placeholder-slate-400 hover:border-indigo-300 focus:bg-white focus:border-indigo-600 focus:outline-none focus:ring-4 focus:ring-indigo-600/10" autofocus tabindex="1">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-600 mb-1.5">Apelido / Nome Social</label>
                    <input type="text" name="apelido" placeholder="Como prefere ser chamado" class="w-full rounded-xl border border-slate-200 bg-slate-50/50 px-3 py-2 text-sm text-slate-900 font-medium transition-all placeholder-slate-400 hover:border-indigo-300 focus:bg-white focus:border-indigo-600 focus:outline-none focus:ring-4 focus:ring-indigo-600/10" tabindex="2">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-1.5">1º Dia no Projeto</label>
                        <input type="date" name="primeiro_dia" class="w-full rounded-xl border border-slate-200 bg-slate-50/50 px-3 py-2 text-sm text-slate-900 font-medium transition-all placeholder-slate-400 hover:border-indigo-300 focus:bg-white focus:border-indigo-600 focus:outline-none focus:ring-4 focus:ring-indigo-600/10" tabindex="3">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-1.5">Documento</label>
                        <input type="text" id="documento" name="documento" placeholder="RG ou CPF" class="w-full rounded-xl border border-slate-200 bg-slate-50/50 px-3 py-2 text-sm text-slate-900 font-medium transition-all placeholder-slate-400 hover:border-indigo-300 focus:bg-white focus:border-indigo-600 focus:outline-none focus:ring-4 focus:ring-indigo-600/10" tabindex="4">
                    </div>
                </div>
            </div>

        </div>

        <div class="w-1/3 flex flex-col gap-4">
            <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-5 flex flex-col flex-1">
                <h3 class="flex items-center gap-2 font-bold text-slate-800 mb-5 pb-3 border-b border-slate-100 text-sm uppercase tracking-wider">
                    <i class="ph ph-users-three text-indigo-600 text-xl"></i> Vínculos e Origem
                </h3>
                <div class="flex flex-col gap-4 h-full justify-between">
                    <div><label class="block text-xs font-bold text-slate-600 mb-1.5">Naturalidade</label><input type="text" name="naturalidade" placeholder="Cidade / Estado" class="w-full rounded-xl border border-slate-200 bg-slate-50/50 px-3 py-2 text-sm text-slate-900 font-medium transition-all placeholder-slate-400 hover:border-indigo-300 focus:bg-white focus:border-indigo-600 focus:outline-none focus:ring-4 focus:ring-indigo-600/10" tabindex="5"></div>
                    
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-1.5">Escolaridade</label>
                        <select name="escolaridade" class="w-full rounded-xl border border-slate-200 bg-slate-50/50 px-3 py-2 text-sm text-slate-900 font-medium transition-all hover:border-indigo-300 focus:bg-white focus:border-indigo-600 focus:outline-none focus:ring-4 focus:ring-indigo-600/10 cursor-pointer" tabindex="6">
                            <option value="" disabled selected>Selecione o nível de ensino...</option>
                            <option value="Analfabeto">Analfabeto</option>
                            <option value="Sabe ler/escrever">Sabe ler/escrever (Sem formação)</option>
                            <option value="Ensino Fundamental Incompleto">Ensino Fundamental Incompleto</option>
                            <option value="Ensino Fundamental Completo">Ensino Fundamental Completo</option>
                            <option value="Ensino Médio Incompleto">Ensino Médio Incompleto</option>
                            <option value="Ensino Médio Completo">Ensino Médio Completo</option>
                            <option value="Ensino Superior Incompleto">Ensino Superior Incompleto</option>
                            <option value="Ensino Superior Completo">Ensino Superior Completo</option>
                        </select>
                    </div>

                    <div><label class="block text-xs font-bold text-slate-600 mb-1.5">Nome da Mãe</label><input type="text" name="mae" placeholder="Nome completo da mãe" class="w-full rounded-xl border border-slate-200 bg-slate-50/50 px-3 py-2 text-sm text-slate-900 font-medium transition-all placeholder-slate-400 hover:border-indigo-300 focus:bg-white focus:border-indigo-600 focus:outline-none focus:ring-4 focus:ring-indigo-600/10" tabindex="7"></div>
                    <div><label class="block text-xs font-bold text-slate-600 mb-1.5">Nome do Pai</label><input type="text" name="pai" placeholder="Nome completo do pai" class="w-full rounded-xl border border-slate-200 bg-slate-50/50 px-3 py-2 text-sm text-slate-900 font-medium transition-all placeholder-slate-400 hover:border-indigo-300 focus:bg-white focus:border-indigo-600 focus:outline-none focus:ring-4 focus:ring-indigo-600/10" tabindex="8"></div>
                    <div><label class="block text-xs font-bold text-slate-600 mb-1.5">Irmãos</label><input type="text" name="irmaos" placeholder="Quantidade ou nomes" class="w-full rounded-xl border border-slate-200 bg-slate-50/50 px-3 py-2 text-sm text-slate-900 font-medium transition-all placeholder-slate-400 hover:border-indigo-300 focus:bg-white focus:border-indigo-600 focus:outline-none focus:ring-4 focus:ring-indigo-600/10" tabindex="9"></div>
                    <div><label class="block text-xs font-bold text-slate-600 mb-1.5">Esposa / Companheira</label><input type="text" name="esposa" placeholder="Nome da companheira atual" class="w-full rounded-xl border border-slate-200 bg-slate-50/50 px-3 py-2 text-sm text-slate-900 font-medium transition-all placeholder-slate-400 hover:border-indigo-300 focus:bg-white focus:border-indigo-600 focus:outline-none focus:ring-4 focus:ring-indigo-600/10" tabindex="10"></div>
                    <div><label class="block text-xs font-bold text-slate-600 mb-1.5">Filhos</label><input type="text" name="filhos" placeholder="Quantidade, idades ou nomes" class="w-full rounded-xl border border-slate-200 bg-slate-50/50 px-3 py-2 text-sm text-slate-900 font-medium transition-all placeholder-slate-400 hover:border-indigo-300 focus:bg-white focus:border-indigo-600 focus:outline-none focus:ring-4 focus:ring-indigo-600/10" tabindex="11"></div>
                </div>
            </div>
        </div>

        <div class="w-1/3 flex flex-col gap-4">
            
            <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-5 flex flex-col">
                <h3 class="flex items-center gap-2 font-bold text-slate-800 mb-5 pb-3 border-b border-slate-100 text-sm uppercase tracking-wider">
                    <i class="ph ph-heart-beat text-rose-500 text-xl"></i> Saúde e Vestuário
                </h3>
                <div class="grid grid-cols-4 gap-3 mb-4">
                    <div>
                        <label class="block text-[11px] font-bold text-slate-600 mb-1.5 text-center">Camisa</label>
                        <select name="tamanho_camisa" class="w-full rounded-xl border border-slate-200 bg-slate-50/50 py-2 text-sm text-slate-900 font-medium transition-all hover:border-indigo-300 focus:bg-white focus:border-indigo-600 focus:outline-none focus:ring-4 focus:ring-indigo-600/10 text-center cursor-pointer" tabindex="12">
                            <option value="">-</option><option value="PP">PP</option><option value="P">P</option><option value="M">M</option><option value="G">G</option><option value="GG">GG</option><option value="XG">XG</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-slate-600 mb-1.5 text-center">Calça</label>
                        <select name="tamanho_calca" class="w-full rounded-xl border border-slate-200 bg-slate-50/50 py-2 text-sm text-slate-900 font-medium transition-all hover:border-indigo-300 focus:bg-white focus:border-indigo-600 focus:outline-none focus:ring-4 focus:ring-indigo-600/10 text-center cursor-pointer" tabindex="13">
                            <option value="">-</option><option value="36">36</option><option value="38">38</option><option value="40">40</option><option value="42">42</option><option value="44">44</option><option value="46">46</option><option value="48">48</option><option value="50">50</option><option value="52+">52+</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-slate-600 mb-1.5 text-center">Calçado</label>
                        <select name="tamanho_calcado" class="w-full rounded-xl border border-slate-200 bg-slate-50/50 py-2 text-sm text-slate-900 font-medium transition-all hover:border-indigo-300 focus:bg-white focus:border-indigo-600 focus:outline-none focus:ring-4 focus:ring-indigo-600/10 text-center cursor-pointer" tabindex="14">
                            <option value="">-</option><option value="37/38">37/38</option><option value="39/40">39/40</option><option value="41/42">41/42</option><option value="43/44">43/44</option><option value="45+">45+</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-slate-600 mb-1.5 text-center">Sangue</label>
                        <select name="tipo_sanguineo" class="w-full rounded-xl border border-slate-200 bg-slate-50/50 py-2 text-sm text-slate-900 font-medium transition-all hover:border-indigo-300 focus:bg-white focus:border-indigo-600 focus:outline-none focus:ring-4 focus:ring-indigo-600/10 text-center cursor-pointer" tabindex="15">
                            <option value="">-</option><option value="A+">A+</option><option value="A-">A-</option><option value="B+">B+</option><option value="B-">B-</option><option value="AB+">AB+</option><option value="AB-">AB-</option><option value="O+">O+</option><option value="O-">O-</option>
                        </select>
                    </div>
                </div>
                <div class="flex flex-col gap-4">
                    <div><label class="block text-xs font-bold text-slate-600 mb-1.5">Condições de Saúde</label><input type="text" name="saude" placeholder="Ex: Pressão alta, diabetes, asma..." class="w-full rounded-xl border border-slate-200 bg-slate-50/50 px-3 py-2 text-sm text-slate-900 font-medium transition-all placeholder-slate-400 hover:border-indigo-300 focus:bg-white focus:border-indigo-600 focus:outline-none focus:ring-4 focus:ring-indigo-600/10" tabindex="16"></div>
                    <div><label class="block text-xs font-bold text-slate-600 mb-1.5">Alergias</label><input type="text" name="alergias" placeholder="Ex: Penicilina, frutos do mar..." class="w-full rounded-xl border border-slate-200 bg-slate-50/50 px-3 py-2 text-sm text-slate-900 font-medium transition-all placeholder-slate-400 hover:border-indigo-300 focus:bg-white focus:border-indigo-600 focus:outline-none focus:ring-4 focus:ring-indigo-600/10" tabindex="17"></div>
                    <div><label class="block text-xs font-bold text-slate-600 mb-1.5">Vícios / Dependência</label><input type="text" name="vicios" placeholder="Ex: Tabagismo, álcool..." class="w-full rounded-xl border border-slate-200 bg-slate-50/50 px-3 py-2 text-sm text-slate-900 font-medium transition-all placeholder-slate-400 hover:border-indigo-300 focus:bg-white focus:border-indigo-600 focus:outline-none focus:ring-4 focus:ring-indigo-600/10" tabindex="18"></div>
                </div>
            </div>

            <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-5 flex flex-col flex-1">
                <h3 class="flex items-center gap-2 font-bold text-slate-800 mb-5 pb-3 border-b border-slate-100 text-sm uppercase tracking-wider">
                    <i class="ph ph-briefcase text-blue-600 text-xl"></i> Contato e Profissional
                </h3>
                <div class="flex flex-col gap-4 h-full justify-between">
                    <div><label class="block text-xs font-bold text-slate-600 mb-1.5">Telefone</label><input type="text" id="telefone" name="telefone" placeholder="(00) 00000-0000" class="w-full rounded-xl border border-slate-200 bg-slate-50/50 px-3 py-2 text-sm text-slate-900 font-medium transition-all placeholder-slate-400 hover:border-indigo-300 focus:bg-white focus:border-indigo-600 focus:outline-none focus:ring-4 focus:ring-indigo-600/10" tabindex="19"></div>
                    <div><label class="block text-xs font-bold text-slate-600 mb-1.5">Endereço</label><input type="text" name="endereco" placeholder="Rua, bairro ou ponto de referência" class="w-full rounded-xl border border-slate-200 bg-slate-50/50 px-3 py-2 text-sm text-slate-900 font-medium transition-all placeholder-slate-400 hover:border-indigo-300 focus:bg-white focus:border-indigo-600 focus:outline-none focus:ring-4 focus:ring-indigo-600/10" tabindex="20"></div>
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-1.5">Aptidões Profissionais</label>
                        <input list="listaAptidoes" name="aptidoes" class="w-full rounded-xl border border-slate-200 bg-slate-50/50 px-3 py-2 text-sm text-slate-900 font-medium transition-all placeholder-slate-400 hover:border-indigo-300 focus:bg-white focus:border-indigo-600 focus:outline-none focus:ring-4 focus:ring-indigo-600/10" placeholder="Ex: Pedreiro, Pintor, Cozinheiro..." tabindex="21">
                        <datalist id="listaAptidoes">
                            <option value="Pedreiro"><option value="Servente"><option value="Pintor"><option value="Carpinteiro"><option value="Cozinheiro"><option value="Jardineiro"><option value="Mecânico">
                        </datalist>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6 flex flex-col items-center justify-center gap-5 shrink-0 relative">
        
        <label class="flex items-center gap-3 cursor-pointer group border border-slate-200 px-6 py-2.5 rounded-xl bg-slate-50 hover:bg-slate-100 hover:border-slate-300 transition-all">
            <input type="checkbox" name="autorizacao_imagem" value="1" class="w-5 h-5 text-indigo-600 bg-white border-slate-300 rounded focus:ring-indigo-600 focus:ring-2" tabindex="22">
            <span class="text-sm font-bold text-slate-700 group-hover:text-slate-900 transition-colors">Autorizo o uso de imagem</span>
        </label>
        
        <button type="submit" class="w-full max-w-2xl flex items-center justify-center gap-3 bg-emerald-500 hover:bg-emerald-600 text-white px-8 py-4 rounded-xl text-lg font-black uppercase tracking-wider shadow-[0_8px_15px_-3px_rgba(16,185,129,0.3)] hover:shadow-[0_12px_20px_-3px_rgba(16,185,129,0.4)] transition-all hover:-translate-y-0.5 active:translate-y-0 active:scale-95" tabindex="23">
            <i class="ph ph-check-circle text-3xl"></i> Finalizar Cadastro
        </button>

        <div id="mensagem-retorno" class="text-sm font-bold text-emerald-600 text-center empty:hidden"></div>
        
    </div>

</form>

<script src="/js/webcam.js"></script>
